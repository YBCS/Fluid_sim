<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smoking Simulator</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<canvas id="smoke-canvas"></canvas>

<div id="gui-container"></div>

<button id="btn-fullscreen" aria-label="Toggle fullscreen">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/>
    </svg>
</button>

<button id="btn-close" aria-label="Close">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
    </svg>
</button>

<div id="overlay-done" class="hidden">
    <p>Cigarette finished.</p>
    <button id="btn-restart">Smoke another</button>
</div>

<script src="src/main.js" type="module"></script>

</body>
</html>
